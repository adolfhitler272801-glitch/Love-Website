<!DOCTYPE html>
<html>
<head>
<title>For My Pondatti ❤️</title>

<style>
body {
    margin:0;
    font-family:Segoe UI;
    background:black;
    color:white;
    overflow:hidden;
}

/* LOCK */
#lock {
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(135deg,#ff4d6d,#ff758c);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

input {
    padding:10px;
    border-radius:20px;
    border:none;
    margin:10px;
}

button {
    padding:10px 20px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    background:white;
    color:#ff4d6d;
}

/* MAIN */
#main {
    display:none;
    height:100vh;
    overflow-y:auto;
    background:linear-gradient(to right,#ff758c,#ff7eb3);
    text-align:center;
    padding:20px;
}

.box {
    background:rgba(0,0,0,0.4);
    padding:20px;
    margin:20px;
    border-radius:20px;
}

/* KISS */
#kiss {
    position:fixed;
    font-size:60px;
    display:none;
    animation:kiss 1s ease;
}

@keyframes kiss {
    0%{transform:scale(0);}
    50%{transform:scale(2);}
    100%{transform:scale(0);}
}

/* HEARTS */
.heart {
    position:fixed;
    bottom:-10px;
    animation:float 5s linear infinite;
}

@keyframes float {
    0%{transform:translateY(0);}
    100%{transform:translateY(-100vh);}
}

/* CHAT */
.chat {
    text-align:left;
}

.msg {
    background:white;
    color:black;
    padding:10px;
    border-radius:10px;
    margin:5px;
    display:inline-block;
}

/* GAME */
.option {
    margin:5px;
}

</style>
</head>

<body>

<div id="lock">
    <h2>Only For My Girl ❤️</h2>
    <input type="password" id="pass" placeholder="Enter password">
    <button onclick="unlock()">Unlock 💖</button>
</div>

<div id="kiss">💋</div>

<div id="main">

<h1>Hey Baby❤️</h1>

<div class="box">
<p id="typing"></p>
</div>

<div class="box">
<h2>Our Beginning 💫</h2>
<p>Jan 10 → where everything started ❤️</p>
<p>Feb 15 → the day you became mine 💖</p>
</div>

<!-- CHAT REPLAY -->
<div class="box">
<h2>Our Chats 💬</h2>
<div class="chat" id="chat"></div>
</div>

<!-- QUESTIONS -->
<div class="box">
<h2>Answer honestly 😏</h2>

<p>Do you love me?</p>
<button class="option" onclick="showAns('I knew it ❤️')">Yes ❤️</button>
<button class="option" onclick="showAns('Still yes 😌')">Maybe 😏</button>

<p id="ans"></p>
</div>

<!-- MEMORY GAME -->
<div class="box">
<h2>Mini Game 🧠</h2>
<p>When did we start talking?</p>
<button onclick="game('wrong')">Feb 15</button>
<button onclick="game('right')">Jan 10</button>
<button onclick="game('wrong')">March</button>

<p id="gameRes"></p>
</div>

</div>

<!-- AUDIO -->
<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<audio id="kissSound">
<source src="https://www.fesliyanstudios.com/play-mp3/4380">
</audio>

<script>

function unlock(){
let p=document.getElementById("pass").value;

if(p==="1502"){  // change password

document.getElementById("lock").style.display="none";

let k=document.getElementById("kiss");
k.style.display="block";
k.style.left="50%";
k.style.top="50%";

document.getElementById("kissSound").play();

setTimeout(()=>{
k.style.display="none";
document.getElementById("main").style.display="block";
document.getElementById("music").play();
typing();
chatReplay();
},1000);

}else{
alert("Wrong password 😜");
}
}

/* typing */
let t="I didn’t plan to fall for you… but I’m really glad I did ❤️";
let i=0;
function typing(){
if(i<t.length){
document.getElementById("typing").innerHTML+=t.charAt(i);
i++;
setTimeout(typing,40);
}
}

/* chat replay */
let msgs=[
"Hey 🙂",
"Hi 😊",
"How are you?",
"Talking with you feels nice ❤️",
"I like you...",
"I love you ❤️"
];

let c=0;
function chatReplay(){
if(c<msgs.length){
let div=document.createElement("div");
div.className="msg";
div.innerText=msgs[c];
document.getElementById("chat").appendChild(div);
c++;
setTimeout(chatReplay,1000);
}
}

/* answers */
function showAns(m){
document.getElementById("ans").innerHTML=m;
}

/* game */
function game(x){
if(x==="right"){
document.getElementById("gameRes").innerHTML="You remember everything ❤️";
}else{
document.getElementById("gameRes").innerHTML="Nooo 😜 try again";
}
}

/* hearts */
function hearts(){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
}
setInterval(hearts,300);

</script>

</body>
</html>
